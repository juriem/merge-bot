name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOOS: darwin
      GOARCH: arm64
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o mergebot .

      - name: Package
        run: |
          PKG="mergebot_${GITHUB_REF_NAME}_darwin_arm64"
          mkdir "$PKG"
          cp mergebot .env.example README.md "$PKG"/
          tar -czf "${PKG}.tar.gz" "$PKG"
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            mergebot_*.tar.gz mergebot_*.tar.gz.sha256

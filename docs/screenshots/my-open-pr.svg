<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 418" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <rect width="1000" height="418" fill="#f6f8fa"/>

  <!-- header -->
  <g transform="translate(32,26)" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="6" r="2.3"/><circle cx="6" cy="18" r="2.3"/><circle cx="18" cy="12" r="2.3"/>
    <path d="M6 8.3v7.4"/><path d="M8.3 6.6c5 .3 7.3 2.4 7.5 5.4"/>
  </g>
  <text x="62" y="45" font-size="20" font-weight="600" fill="#1f2328">mergebot</text>
  <text x="168" y="45" font-size="14" fill="#656d76">acme/monorepo</text>
  <g text-anchor="end">
    <text x="648" y="42" font-size="18" font-weight="600" fill="#1f2328">15</text>
    <text x="732" y="42" font-size="18" font-weight="600" fill="#1f2328">6</text>
    <text x="828" y="42" font-size="18" font-weight="600" fill="#1f2328">7m12s</text>
    <text x="648" y="56" font-size="9" fill="#656d76" letter-spacing="0.5">IN QUEUE</text>
    <text x="732" y="56" font-size="9" fill="#656d76" letter-spacing="0.5">MERGED</text>
    <text x="828" y="56" font-size="9" fill="#656d76" letter-spacing="0.5">AVG MERGE</text>
  </g>
  <g transform="translate(858,24)" fill="#2563eb" opacity="0.75">
    <rect x="0" y="16" width="15" height="10" rx="1"/><rect x="18" y="8" width="15" height="18" rx="1"/>
    <rect x="36" y="20" width="15" height="6" rx="1"/><rect x="54" y="2" width="15" height="24" rx="1"/>
    <rect x="72" y="12" width="15" height="14" rx="1"/><rect x="90" y="18" width="15" height="8" rx="1"/>
  </g>
  <text x="968" y="62" text-anchor="end" font-size="9" fill="#656d76" letter-spacing="0.5">MERGE TIME</text>

  <!-- tabs -->
  <g font-size="15">
    <text x="32" y="100" fill="#656d76">Merge Queue</text>
    <rect x="138" y="89" width="26" height="17" rx="8.5" fill="#eef1f4"/><text x="151" y="101.5" text-anchor="middle" font-size="11" font-weight="600" fill="#656d76">15</text>
    <text x="186" y="100" fill="#656d76">Merge conflicts</text>
    <rect x="304" y="89" width="22" height="17" rx="8.5" fill="#eef1f4"/><text x="315" y="101.5" text-anchor="middle" font-size="11" font-weight="600" fill="#656d76">0</text>
    <text x="346" y="100" font-weight="600" fill="#1f2328">My Open PR</text>
    <rect x="436" y="89" width="22" height="17" rx="8.5" fill="#2563eb"/><text x="447" y="101.5" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">4</text>
    <text x="478" y="100" fill="#656d76">Failed</text>
    <rect x="530" y="89" width="22" height="17" rx="8.5" fill="#eef1f4"/><text x="541" y="101.5" text-anchor="middle" font-size="11" font-weight="600" fill="#656d76">0</text>
    <text x="574" y="100" fill="#656d76">History</text>
    <rect x="636" y="89" width="22" height="17" rx="8.5" fill="#eef1f4"/><text x="647" y="101.5" text-anchor="middle" font-size="11" font-weight="600" fill="#656d76">6</text>
  </g>
  <rect x="346" y="112" width="118" height="2.5" fill="#2563eb"/>
  <line x1="32" y1="120" x2="968" y2="120" stroke="#d6dbe1"/>

  <!-- toolbar -->
  <rect x="772" y="138" width="80" height="28" rx="8" fill="#ffffff" stroke="#d6dbe1"/><text x="812" y="156" text-anchor="middle" font-size="13" fill="#1f2328">Refresh</text>
  <rect x="860" y="138" width="108" height="28" rx="8" fill="#2563eb"/><text x="914" y="156" text-anchor="middle" font-size="13" fill="#ffffff">Generate list</text>

  <!-- card -->
  <rect x="32" y="176" width="936" height="222" rx="12" fill="#ffffff" stroke="#d6dbe1"/>
  <path d="M44 176 H956 a12 12 0 0 1 12 12 V210 H32 V188 a12 12 0 0 1 12 -12 Z" fill="#eef1f4"/>
  <line x1="32" y1="210" x2="968" y2="210" stroke="#d6dbe1"/>
  <g font-size="11" fill="#656d76" letter-spacing="0.6">
    <text x="52" y="197">PR</text><text x="170" y="197">STATUS</text><text x="372" y="197">MESSAGE</text><text x="812" y="197">TIME</text>
  </g>

  <!-- rows -->
  <g font-size="15">
    <text x="52" y="239" font-weight="600" fill="#2563eb">#7278</text>
    <rect x="170" y="223" width="46" height="22" rx="11" fill="#e5f1ea"/><text x="193" y="239" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a7f37">2/2</text>
    <text x="372" y="239" font-size="14" fill="#1f2328">Drop the suite ctx field in common test helpers <tspan fill="#656d76" font-size="12.5">— checks not green</tspan></text>

    <line x1="32" y1="257" x2="968" y2="257" stroke="#eef1f4"/>
    <text x="52" y="286" font-weight="600" fill="#2563eb">#7349</text>
    <rect x="170" y="270" width="46" height="22" rx="11" fill="#efeafa"/><text x="193" y="286" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8250df">0/2</text>
    <text x="372" y="286" font-size="14" fill="#1f2328">Make the review status field edit-only with an enum</text>

    <line x1="32" y1="304" x2="968" y2="304" stroke="#eef1f4"/>
    <text x="52" y="333" font-weight="600" fill="#2563eb">#7038</text>
    <rect x="170" y="317" width="46" height="22" rx="11" fill="#efeafa"/><text x="193" y="333" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8250df">0/2</text>
    <text x="372" y="333" font-size="14" fill="#1f2328">Publish events directly to the broker, retire outbox writers</text>

    <line x1="32" y1="351" x2="968" y2="351" stroke="#eef1f4"/>
    <text x="52" y="380" font-weight="600" fill="#2563eb">#7290</text>
    <rect x="170" y="364" width="46" height="22" rx="11" fill="#e5f1ea"/><text x="193" y="380" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a7f37">2/2</text>
    <text x="372" y="380" font-size="14" fill="#1f2328">Introduce testcontainers for integration tests</text>
    <rect x="856" y="363" width="112" height="26" rx="8" fill="#2563eb"/><text x="912" y="380" text-anchor="middle" font-size="12" fill="#ffffff">Add to queue</text>
  </g>
</svg>
